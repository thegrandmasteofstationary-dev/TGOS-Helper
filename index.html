<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Receipt POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            @page { size: A4 landscape; margin: 10mm; } 
            body { background-color: white; color: black; -webkit-print-color-adjust: exact; }
            
            .screen-area { display: none !important; }
            #printLayout { display: block !important; width: 100%; }
            
            .print-page { width: 100%; height: 100%; page-break-after: always; page-break-inside: avoid; display: flex; gap: 4%; }
            .print-page:last-child { page-break-after: auto; }
            
            /* Font dikembalikan ke ukuran normal (12px/11px) agar tidak kekecilan */
            table { border-collapse: collapse; width: 100%; font-size: 11px; }
            th, td { padding: 4px 6px !important; line-height: 1.2 !important; border-bottom: 1px solid #ddd; }
            th { border-bottom: 2px solid black; }
            
            h2 { margin-bottom: 4px !important; font-size: 18px !important; }
            
            /* Garis potong tengah */
            .col-kanan { border-left: 1px dashed #999; padding-left: 4%; }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="screen-area p-4 md:p-8 flex justify-center">
        <div class="max-w-7xl w-full grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            
            <div class="lg:col-span-4 bg-white p-6 rounded-lg shadow-md sticky top-4 flex flex-col gap-4">
                <h2 class="text-xl font-bold border-b pb-2">Kasir / POS Scanner</h2>
                
                <div>
                    <label class="block text-sm font-semibold mb-1">1. Scan Barcode</label>
                    <input type="text" id="barcodeInput" class="w-full border-2 border-blue-400 rounded p-3 text-lg focus:outline-none focus:ring-4 focus:ring-blue-300 transition-all" placeholder="Menunggu database dimuat..." disabled autofocus>
                    <p id="namaBarangPreview" class="text-sm text-green-600 font-bold mt-2 h-5"></p>
                </div>

                <div class="grid grid-cols-2 gap-4 items-start">
                    <div>
                        <label class="block text-sm font-semibold mb-1">2. Qty</label>
                        <input type="number" id="qtyInput" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500" value="1" min="1" disabled>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">3. Satuan</label>
                        <select id="unitInput" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500" disabled>
                            <option value="pcs">Pcs</option>
                            <option value="lusin">Lusin</option>
                            <option value="pak">Pak</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm font-semibold mb-1">4. Harga (Bisa Diubah)</label>
                        <div class="flex flex-col gap-2">
                            <select id="hargaSelect" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 bg-gray-100 text-sm" disabled>
                                <option value="">Scan barang dulu...</option>
                            </select>
                            <input type="number" id="customHargaInput" class="w-full border-2 border-green-400 rounded p-2 focus:ring-2 focus:ring-green-500 font-bold" placeholder="Ketik harga custom..." disabled>
                        </div>
                    </div>
                </div>

                <button id="btnTambah" class="bg-blue-600 text-white px-4 py-3 rounded-lg hover:bg-blue-700 w-full font-bold disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors" disabled>
                    Tambahkan ke Struk (Enter)
                </button>
            </div>

            <div class="lg:col-span-8 bg-white p-6 lg:p-8 rounded-lg shadow-md flex flex-col h-full">
                <div class="mb-6">
                    <p><strong>Tanggal:</strong> <span id="displayTanggal"></span></p>
                    <div class="flex items-center gap-2 mt-2">
                        <strong>Tuan Toko:</strong> 
                        <input type="text" id="inputTuanToko" class="border-b focus:outline-none w-64" placeholder="Ketik nama pelanggan...">
                    </div>
                    <div class="flex items-center gap-2 mt-2">
                        <strong>Catatan&nbsp;&nbsp;&nbsp;&nbsp;:</strong> 
                        <input type="text" id="inputCatatan" class="border-b focus:outline-none w-80 text-sm" placeholder="Tambahkan catatan (opsional)...">
                    </div>
                </div>

                <div id="infoRedundansi" class="hidden bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-3 rounded shadow-sm mb-4 text-sm transition-all">
                    <strong class="font-bold">⚠️ Terdapat Redundansi Baris:</strong>
                    <span class="block sm:inline" id="teksRedundansi"></span>
                </div>

                <table class="w-full text-left mb-6 border-collapse">
                    <thead>
                        <tr class="border-b-2 border-gray-400 text-sm">
                            <th class="py-2 w-[5%] text-center">No</th>
                            <th class="py-2 w-[15%]">Banyaknya</th>
                            <th class="py-2 w-[35%]">Nama Barang</th>
                            <th class="py-2 w-[20%]">Harga</th>
                            <th class="py-2 w-[15%]">Jumlah</th>
                            <th class="py-2 w-[10%] text-center">Hapus</th>
                        </tr>
                    </thead>
                    <tbody id="listBarang">
                        </tbody>
                </table>

                <div class="border-t-2 border-gray-400 pt-4 flex flex-col items-end mt-auto">
                    <h3 class="text-xl font-bold mb-2">Total: Rp <span id="totalAkhir">0</span></h3>
                    <p class="text-lg font-semibold italic">Toko Faster</p>
                </div>

                <div class="mt-6 flex justify-end">
                    <button onclick="cetakStruk()" class="bg-green-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-green-700 shadow-lg flex items-center gap-2 transition-colors">
                        🖨️ Cetak Struk / PDF
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="printLayout" class="hidden print:block w-full"></div>

    <script>
        document.getElementById('displayTanggal').innerText = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

        let database = {};
        let currentBarang = null; 

        async function fetchDatabase() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQqFjmQEMLJl-UhiBkV6hDmVePKMGhWgUkwqPWiUOcv6YeBjX9-mw75au_WztJIkcbwr0D2hcDAGZrw/pub?gid=1746227063&single=true&output=csv';
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Gagal mengambil data");
                const csvText = await response.text();
                const rows = csvText.split('\n');
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 8) { 
                        let nama = cols[1].replace(/['"]+/g, '').trim();
                        let kodeJamak = cols[2].replace(/['"]+/g, '').trim();
                        let kodeTunggal = cols[3].replace(/['"]+/g, '').trim();
                        let hargaG1 = parseInt(cols[4].replace(/['"\.]+/g, '').trim()) || 0;
                        let hargaG2 = parseInt(cols[5].replace(/['"\.]+/g, '').trim()) || 0;
                        let hargaE1 = parseInt(cols[6].replace(/['"\.]+/g, '').trim()) || 0;
                        let hargaE2 = parseInt(cols[7].replace(/['"\.]+/g, '').trim()) || 0;
                        
                        let baseData = { nama, g1: hargaG1, g2: hargaG2, e1: hargaE1, e2: hargaE2 };
                        
                        // Masukkan barcode ke database (tanpa pandang bulu tipe lagi)
                        if (kodeJamak !== "") database[kodeJamak] = baseData;
                        if (kodeTunggal !== "") database[kodeTunggal] = baseData;
                    }
                }
                let inputScanner = document.getElementById('barcodeInput');
                inputScanner.disabled = false;
                inputScanner.placeholder = "Siap! Scan barcode di sini...";
                inputScanner.focus();
            } catch (error) {
                document.getElementById('namaBarangPreview').innerText = "Gagal memuat database!";
                document.getElementById('namaBarangPreview').classList.replace('text-green-600', 'text-red-600');
            }
        }
        window.onload = fetchDatabase;

        document.getElementById('barcodeInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault(); 
                let barcode = this.value.trim();
                if (barcode === "") return;
                
                if (database[barcode]) {
                    currentBarang = database[barcode];
                    document.getElementById('namaBarangPreview').innerText = "Terdeteksi: " + currentBarang.nama;
                    document.getElementById('namaBarangPreview').classList.replace('text-red-600', 'text-green-600');
                    document.getElementById('qtyInput').disabled = false;
                    document.getElementById('unitInput').disabled = false;
                    
                    let hargaSelect = document.getElementById('hargaSelect');
                    let customHargaInput = document.getElementById('customHargaInput');
                    
                    hargaSelect.disabled = false;
                    hargaSelect.classList.remove('bg-gray-100');
                    customHargaInput.disabled = false;
                    document.getElementById('btnTambah').disabled = false;

                    // SEMUA HARGA DITAMPILKAN
                    hargaSelect.innerHTML = `
                        <option value="${currentBarang.e2}">Eceran 2 (Rp ${currentBarang.e2.toLocaleString('id-ID')})</option>
                        <option value="${currentBarang.e1}">Eceran 1 (Rp ${currentBarang.e1.toLocaleString('id-ID')})</option>
                        <option value="${currentBarang.g2}">Grosir 2 (Rp ${currentBarang.g2.toLocaleString('id-ID')})</option>
                        <option value="${currentBarang.g1}">Grosir 1 (Rp ${currentBarang.g1.toLocaleString('id-ID')})</option>
                    `;
                    
                    customHargaInput.value = hargaSelect.value;
                    hargaSelect.onchange = function() { customHargaInput.value = this.value; };
                    document.getElementById('qtyInput').focus();
                    document.getElementById('qtyInput').select();
                } else {
                    document.getElementById('namaBarangPreview').innerText = "❌ Barcode tidak ditemukan!";
                    document.getElementById('namaBarangPreview').classList.replace('text-green-600', 'text-red-600');
                    this.value = '';
                }
            }
        });

        ['qtyInput', 'unitInput', 'hargaSelect', 'customHargaInput'].forEach(id => {
            document.getElementById(id).addEventListener('keypress', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); prosesTambahKeList(); }
            });
        });
        document.getElementById('btnTambah').addEventListener('click', prosesTambahKeList);

        function prosesTambahKeList() {
            if (!currentBarang) return;
            let qty = parseInt(document.getElementById('qtyInput').value) || 1;
            let unit = document.getElementById('unitInput').value;
            let hargaSatuan = parseInt(document.getElementById('customHargaInput').value) || 0;

            let tbody = document.getElementById('listBarang');
            let tr = document.createElement('tr');
            tr.className = "border-b border-gray-200 baris-barang hover:bg-gray-50";

            tr.innerHTML = `
                <td class="py-2 align-top text-sm text-center font-semibold"><span class="nomor-urut"></span></td>
                <td class="py-2 align-top text-sm">
                    <div class="flex gap-1 items-center">
                        <input type="number" class="w-14 border rounded p-1 text-sm row-qty focus:ring-2 focus:ring-blue-400" value="${qty}" min="1">
                        <select class="border rounded p-1 text-sm row-unit focus:ring-2 focus:ring-blue-400">
                            <option value="pcs" ${unit==='pcs'?'selected':''}>Pcs</option>
                            <option value="lusin" ${unit==='lusin'?'selected':''}>Lusin</option>
                            <option value="pak" ${unit==='pak'?'selected':''}>Pak</option>
                        </select>
                    </div>
                </td>
                <td class="py-2 align-top pr-2">
                    <textarea class="w-full border rounded p-1 text-sm focus:ring-2 focus:ring-blue-400 row-nama resize-none h-10">${currentBarang.nama}</textarea>
                </td>
                <td class="py-2 align-top pr-2">
                    <input type="number" class="w-full border rounded p-1 text-sm row-harga focus:ring-2 focus:ring-blue-400" value="${hargaSatuan}">
                </td>
                <td class="py-2 align-top">
                    <span class="subtotal-teks font-medium text-sm">Rp 0</span>
                </td>
                <td class="py-2 align-top text-center">
                    <button class="text-red-500 hover:text-red-700 font-bold btn-hapus" title="Hapus Baris">✕</button>
                </td>
            `;

            let inputs = tr.querySelectorAll('.row-qty, .row-unit, .row-harga, .row-nama');
            inputs.forEach(input => {
                input.addEventListener('input', updateBaris);
                input.addEventListener('change', updateBaris);
            });

            tr.querySelector('.btn-hapus').addEventListener('click', function() {
                tr.remove(); hitungTotalSemua(); updateNomorUrut(); cekSemuaRedundansi(); 
            });

            function updateBaris() {
                let rQty = parseInt(tr.querySelector('.row-qty').value) || 0;
                let rHarga = parseInt(tr.querySelector('.row-harga').value) || 0;
                let rSubtotal = rHarga * rQty;
                tr.querySelector('.subtotal-teks').innerText = 'Rp ' + rSubtotal.toLocaleString('id-ID');
                hitungTotalSemua(); cekSemuaRedundansi();
            }

            tbody.appendChild(tr);
            updateBaris(); updateNomorUrut(); cekSemuaRedundansi(); resetAreaInput();
        }

        function cekSemuaRedundansi() {
            let listNama = Array.from(document.querySelectorAll('.row-nama')).map(ta => ta.value.trim());
            let counts = {};
            listNama.forEach(nama => { counts[nama] = (counts[nama] || 0) + 1; });
            let redundanItems = [];
            for (let nama in counts) {
                if (counts[nama] > 1 && nama !== "") redundanItems.push(`${nama} (${counts[nama]} baris)`);
            }
            let infoBar = document.getElementById('infoRedundansi');
            if (redundanItems.length > 0) {
                document.getElementById('teksRedundansi').innerText = redundanItems.join(', ');
                infoBar.classList.remove('hidden');
            } else {
                infoBar.classList.add('hidden');
            }
        }

        function resetAreaInput() {
            currentBarang = null;
            document.getElementById('barcodeInput').value = '';
            document.getElementById('namaBarangPreview').innerText = '';
            document.getElementById('qtyInput').value = '1';
            document.getElementById('qtyInput').disabled = true;
            document.getElementById('unitInput').value = 'pcs';
            document.getElementById('unitInput').disabled = true;
            let hargaSelect = document.getElementById('hargaSelect');
            hargaSelect.innerHTML = '<option value="">Scan barang dulu...</option>';
            hargaSelect.disabled = true;
            hargaSelect.classList.add('bg-gray-100');
            let customHargaInput = document.getElementById('customHargaInput');
            customHargaInput.value = '';
            customHargaInput.disabled = true;
            document.getElementById('btnTambah').disabled = true;
            document.getElementById('barcodeInput').focus();
        }

        function updateNomorUrut() {
            document.querySelectorAll('.baris-barang').forEach((tr, index) => {
                tr.querySelector('.nomor-urut').innerText = index + 1;
            });
        }

        function hitungTotalSemua() {
            let grandTotal = 0;
            document.querySelectorAll('.baris-barang').forEach(tr => {
                let rQty = parseInt(tr.querySelector('.row-qty').value) || 0;
                let rHarga = parseInt(tr.querySelector('.row-harga').value) || 0;
                grandTotal += (rQty * rHarga);
            });
            document.getElementById('totalAkhir').innerText = grandTotal.toLocaleString('id-ID');
        }

        // ====================================================================
        // ENGINE PENCETAKAN: DUPLIKAT JIKA <= 25, BELAH/SAMBUNG JIKA > 25
        // ====================================================================
        function cetakStruk() {
            let printData = [];
            document.querySelectorAll('.baris-barang').forEach((tr, index) => {
                let qty = parseInt(tr.querySelector('.row-qty').value) || 0;
                let unit = tr.querySelector('.row-unit').value;
                let nama = tr.querySelector('.row-nama').value;
                let harga = parseInt(tr.querySelector('.row-harga').value) || 0;
                let subtotal = harga * qty;
                printData.push({ no: index + 1, qty, unit, nama, harga, subtotal });
            });

            let tanggal = document.getElementById('displayTanggal').innerText;
            let tuanToko = document.getElementById('inputTuanToko').value || '-';
            let catatan = document.getElementById('inputCatatan').value || '-';
            let grandTotal = document.getElementById('totalAkhir').innerText;

            let html = '';
            let totalItems = printData.length;
            let maxPerColumn = 25; 

            if (totalItems === 0) {
                html = '<p style="text-align:center; padding-top:40px; font-size: 20px;">Struk kosong.</p>';
            }

            // --- BAGIAN HEADER & TOTAL YANG BISA DIPAKAI BERULANG ---
            let headerHTML = `
                <div class="mb-3">
                    <h2 class="font-bold italic">Toko Faster</h2>
                    <table style="width: auto !important; font-size: 11px;">
                        <tr><td class="font-bold !pr-2 !pb-0 !pl-0 !pt-0">Tanggal</td><td class="!p-0">: ${tanggal}</td></tr>
                        <tr><td class="font-bold !pr-2 !pb-0 !pl-0 !pt-0">Tuan Toko</td><td class="!p-0">: ${tuanToko}</td></tr>
                        <tr><td class="font-bold !pr-2 !pb-0 !pl-0 !pt-0">Catatan</td><td class="!p-0">: ${catatan}</td></tr>
                    </table>
                </div>`;

            let totalHTML = `
                <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
                    <div style="border-top: 2px solid black; padding-top: 4px; padding-left: 16px; text-align: right;">
                        <h3 style="font-size: 14px; font-weight: bold; margin:0;">Total: Rp ${grandTotal}</h3>
                    </div>
                </div>`;


            if (totalItems <= maxPerColumn && totalItems > 0) {
                // ==========================================
                // SKENARIO 1: <= 25 BARIS (RANGKAP / DOUBLE)
                // ==========================================
                let tableHTML = renderPrintTable(printData);
                
                // Susun 1 layout utuh
                let fullReceipt = `
                    <div style="display:flex; flex-direction:column; height:100%;">
                        ${headerHTML}
                        <div style="flex-grow:1;">${tableHTML}</div>
                        ${totalHTML}
                    </div>
                `;

                // Render 2 kali (kiri dan kanan)
                html = `
                <div class="print-page">
                    <div style="width: 48%;">${fullReceipt}</div>
                    <div class="col-kanan" style="width: 48%;">${fullReceipt}</div>
                </div>`;

            } else if (totalItems > maxPerColumn) {
                // ==========================================
                // SKENARIO 2: > 25 BARIS (SAMBUNG / SPLIT)
                // ==========================================
                for (let i = 0; i < totalItems; i += 50) { // 50 items per halaman utuh
                    let chunk = printData.slice(i, i + 50);
                    let col1 = chunk.slice(0, 25);
                    let col2 = chunk.slice(25, 50);

                    let isFirstPage = (i === 0);
                    let isLastPage = (i + 50 >= totalItems);

                    html += `<div class="print-page">`;
                    
                    // -- KOLOM KIRI --
                    html += `<div style="width: 48%; display:flex; flex-direction:column;">`;
                    if (isFirstPage) html += headerHTML; // Header di kiri atas
                    html += `<div style="flex-grow:1;">${renderPrintTable(col1)}</div>`;
                    if (isLastPage && col2.length === 0) html += totalHTML; // Kalau pas abis di kolom kiri
                    html += `</div>`;
                    
                    // -- KOLOM KANAN --
                    html += `<div class="col-kanan" style="width: 48%; display:flex; flex-direction:column;">`;
                    if (col2.length > 0) {
                        html += `<div style="flex-grow:1;">${renderPrintTable(col2)}</div>`;
                        if (isLastPage) html += totalHTML; // Kalau abisnya di kolom kanan
                    }
                    html += `</div>`;
                    
                    html += `</div>`; // Tutup Halaman
                }
            }

            document.getElementById('printLayout').innerHTML = html;
            window.print();
        }

        function renderPrintTable(items) {
            if(items.length === 0) return '';
            let t = `
            <table style="width: 100%; text-align: left;">
                <thead>
                    <tr>
                        <th style="width: 5%; font-weight: bold;">No</th>
                        <th style="width: 18%; font-weight: bold;">Qty</th>
                        <th style="width: 42%; font-weight: bold;">Nama Barang</th>
                        <th style="width: 15%; font-weight: bold; text-align: right;">Harga</th>
                        <th style="width: 20%; font-weight: bold; text-align: right;">Jumlah</th>
                    </tr>
                </thead>
                <tbody>`;
            items.forEach(item => {
                t += `
                <tr>
                    <td style="vertical-align: top;">${item.no}</td>
                    <td style="vertical-align: top;">${item.qty} ${item.unit}</td>
                    <td style="vertical-align: top; word-break: break-word; padding-right: 4px;">${item.nama}</td>
                    <td style="vertical-align: top; text-align: right;">${item.harga.toLocaleString('id-ID')}</td>
                    <td style="vertical-align: top; text-align: right;">${item.subtotal.toLocaleString('id-ID')}</td>
                </tr>`;
            });
            t += `</tbody></table>`;
            return t;
        }
    </script>
</body>
</html>
