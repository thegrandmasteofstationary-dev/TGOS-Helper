<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Receipt POS - Kasir</title>
    <link href="./output.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="icon" type="image/png" href="FASTER.png">
    <style>
        /* ========================================================
           TEMA WARNA & BACKGROUND KOTAK-KOTAK (GINGHAM)
           ======================================================== */
        .bg-gingham {
            background-color: #dbe4c6; 
            background-image: 
                repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255, 255, 255, 0.4) 40px, rgba(255, 255, 255, 0.4) 80px),
                repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255, 255, 255, 0.4) 40px, rgba(255, 255, 255, 0.4) 80px);
        }

        .warna-utama { background-color: #647a46; } 
        .warna-teks-utama { color: #647a46; }
        .warna-aksen { background-color: #e8ecdc; } 

        .input-custom {
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            padding: 10px;
            transition: all 0.2s;
        }
        .input-custom:focus {
            border-color: #647a46;
            outline: none;
            box-shadow: 0 0 0 3px rgba(100, 122, 70, 0.2);
        }

        /* ========================================================
           PENGATURAN KHUSUS PRINTER
           ======================================================== */
        @media print {
            @page { size: A4 landscape; margin: 10mm; } 
            body { background-color: white; color: black; -webkit-print-color-adjust: exact; background-image: none !important; }
            .screen-area { display: none !important; }
            #printLayout { display: block !important; width: 100%; }
            .print-page { width: 100%; height: 100%; page-break-after: always; page-break-inside: avoid; display: flex; gap: 4%; }
            .print-page:last-child { page-break-after: auto; }
            table { border-collapse: collapse; width: 100%; font-size: 11px; }
            th, td { padding: 4px 6px !important; line-height: 1.2 !important; border: 1px solid black !important; }
            th { background-color: #f2f2f2 !important; }
            h2 { margin-bottom: 2px !important; font-size: 18px !important; }
            .address-text { font-size: 10px; margin-bottom: 8px; font-style: italic; }
            .col-kanan { border-left: 1px dashed #999; padding-left: 4%; }
            .area-tanda-tangan { position: relative; margin-top: 15px; font-size: 11px; text-align: right; display: block; width: 100%; min-height: 80px; }
            .cap-stempel { position: absolute; right: 45px; top: -10px; width: 85px; height: 85px; opacity: 0.5; z-index: 1; pointer-events: none; transform: rotate(-15deg); }
            .teks-tanda-tangan { position: relative; z-index: 2; padding-right: 10px; }
        }
    </style>
</head>
<body class="bg-gingham min-h-screen text-gray-800 font-sans flex flex-col relative pb-20">
    <div id="statusTablet" class="screen-area text-center py-1 text-xs font-bold bg-red-500 text-white shadow-md z-10 transition-colors">
        🔴 Tablet Pelanggan Offline
    </div>

    <div class="screen-area p-6 flex-1 flex justify-center items-start">
        <div class="max-w-[1400px] w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-4 bg-white rounded-[32px] p-8 shadow-xl flex flex-col gap-5 border border-gray-100 h-fit sticky top-6">
                <h2 class="text-3xl font-extrabold mb-2 border-b-2 border-gray-100 pb-4">Kasir (POS Scanner)</h2>
                
                <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700">Scan Barcode / Nama</label>
                    <div class="relative">
                        <input type="text" id="barcodeInput" autocomplete="off" class="w-full input-custom text-lg" placeholder="Menunggu database..." disabled autofocus>
                        <ul id="searchDropdown" class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-lg hidden max-h-60 overflow-y-auto mt-1 text-sm"></ul>
                    </div>
                    <p id="namaBarangPreview" class="text-sm text-green-600 font-bold mt-2 h-4"></p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-gray-700">QTY.</label>
                        <input type="number" id="qtyInput" class="w-full input-custom text-lg text-center" value="1" min="1" disabled>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-gray-700">Satuan</label>
                        <select id="unitInput" class="w-full input-custom text-lg appearance-none bg-white pr-8" disabled>
                            <option value="pcs">Pcs</option>
                            <option value="lusin">Lusin</option>
                            <option value="pak">Pak</option>
                            <option value="dus">Dus</option>
                            <option value="slop/roll">Slop/roll</option>
                            <option value="rim">Rim</option>
                            <option value="ball">Ball</option>
                            <option value="kodi">Kodi</option>
                            <option value="gross">Gross</option>
                            <option value="papan">Papan</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700">Harga Jual</label>
                    <div class="flex flex-col gap-3">
                        <select id="hargaSelect" class="w-full input-custom text-lg appearance-none bg-gray-50 pr-8" disabled>
                            <option value="">Pilih harga otomatis...</option>
                        </select>
                        <input type="number" id="customHargaInput" class="w-full input-custom text-lg font-bold text-gray-800" placeholder="Harga manual..." disabled>
                    </div>
                </div>

                <button id="btnTambah" class="warna-utama text-white text-xl px-4 py-4 rounded-xl shadow-md hover:opacity-90 w-full font-bold mt-4 disabled:bg-gray-400 disabled:cursor-not-allowed transition-all" disabled>
                    Tambahkan
                </button>
            </div>

            <div class="lg:col-span-8 bg-white rounded-[32px] p-8 shadow-xl flex flex-col border border-gray-100 min-h-[600px]">
                
                <div class="mb-6 flex flex-col gap-3 font-bold text-gray-800 text-lg">
                    <div class="flex items-center gap-4">
                        <span class="w-32">Tanggal:</span> 
                        <span id="displayTanggal" class="font-normal text-gray-600"></span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="w-32">Tuan Toko:</span> 
                        <input type="text" id="inputTuanToko" class="border-b-2 border-gray-300 focus:border-[#647a46] outline-none flex-1 py-1 font-normal bg-transparent" placeholder="Nama Pelanggan...">
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="w-32">Keterangan:</span> 
                        <input type="text" id="inputCatatan" class="border-b-2 border-gray-300 focus:border-[#647a46] outline-none flex-1 py-1 font-normal bg-transparent" placeholder="Catatan tambahan...">
                    </div>
                </div>

                <div id="infoRedundansi" class="hidden bg-yellow-100 border-l-4 border-yellow-500 text-yellow-800 p-3 rounded-lg shadow-sm mb-4 text-sm font-medium">
                    ⚠️ Terdapat Redundansi Baris: <span id="teksRedundansi"></span>
                </div>

                <div class="warna-aksen rounded-2xl p-6 flex-1 flex flex-col shadow-inner overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b-2 border-gray-400 text-sm uppercase tracking-wide text-gray-700">
                                <th class="pb-3 w-[5%] font-bold text-center">No.</th>
                                <th class="pb-3 w-[20%] font-bold pl-2">Banyaknya</th>
                                <th class="pb-3 w-[30%] font-bold pl-2">Nama Barang</th>
                                <th class="pb-3 w-[20%] font-bold text-right pr-2">Harga</th>
                                <th class="pb-3 w-[15%] font-bold text-right pr-2">Jumlah</th>
                                <th class="pb-3 w-[10%] font-bold text-center">Hapus</th>
                            </tr>
                        </thead>
                        <tbody id="listBarang">
                        </tbody>
                    </table>
                    
                    <div class="border-t-2 border-gray-400 mt-auto pt-6 flex flex-col items-end">
                        <h3 class="text-xl md:text-3xl font-extrabold mb-1">Total: Rp <span id="totalAkhir">0</span></h3>
                    </div>
                </div>

                <div class="mt-6 flex justify-end pb-4">
                    <button onclick="cetakStruk()" class="warna-utama text-white px-12 py-4 rounded-xl font-bold text-xl hover:opacity-90 shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1">
                        Cetak Struk
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="screen-area fixed bottom-4 left-1/2 transform -translate-x-1/2 z-50 pointer-events-none">
        <div class="warna-utama text-white px-6 py-2 rounded-full font-bold shadow-lg text-sm tracking-wider opacity-80 backdrop-blur-sm border border-white/20">
            TGOS HELPER © ALL RIGHTS RESERVED 2026
        </div>
    </div>

    <div id="printLayout" class="hidden print:block w-full"></div>

    <script>
        document.getElementById('displayTanggal').innerText = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

        let database = {}; 
        let listProdukUnik = []; 
        let currentBarang = null; 

        const NAMA_TOKO = "Toko Faster";
        const ALAMAT_TOKO = "Jl. Tugu Pahlawan No.43, Bukit Cermin, Kec. Tanjungpinang Bar., Kota Tanjung Pinang, Kepulauan Riau"; 
        const URL_STEMPEL = "logo.png"; 

        const preloader = new Image(); preloader.src = URL_STEMPEL;

        // ====================================================================
        // SISTEM KOMUNIKASI P2P KE TABLET PELANGGAN
        // ====================================================================
        const peer = new Peer('kasir-tokofaster-01');
        let koneksiTablet = null;

        peer.on('connection', (conn) => {
            if (koneksiTablet && koneksiTablet.open) {
                setTimeout(() => {
                    conn.send({ error: 'ALREADY_CONNECTED' });
                    setTimeout(() => conn.close(), 500);
                }, 500);
                return;
            }

            koneksiTablet = conn;
            let statusBadge = document.getElementById('statusTablet');
            statusBadge.innerText = "🟢 Tablet Pelanggan Online";
            statusBadge.className = "screen-area text-center py-1 text-xs font-bold bg-[#647a46] text-white shadow-md z-10 transition-colors";
            
            broadcastKeTablet();

            conn.on('close', () => {
                koneksiTablet = null;
                statusBadge.innerText = "🔴 Tablet Pelanggan Offline";
                statusBadge.className = "screen-area text-center py-1 text-xs font-bold bg-red-500 text-white shadow-md z-10 transition-colors";
            });
        });

        function broadcastKeTablet() {
            if (!koneksiTablet || !koneksiTablet.open) return; 
            
            let dataKeranjang = [];
            document.querySelectorAll('.baris-barang').forEach((tr, index) => {
                let qty = parseInt(tr.querySelector('.row-qty').value) || 0;
                let unit = tr.querySelector('.row-unit').value;
                let nama = tr.querySelector('.row-nama').value;
                let harga = parseInt(tr.querySelector('.row-harga').value) || 0;
                dataKeranjang.push({ no: index + 1, qty, unit, nama, harga, subtotal: harga*qty });
            });
            let total = document.getElementById('totalAkhir').innerText;
            koneksiTablet.send({ items: dataKeranjang, grandTotal: total });
        }

        // ====================================================================
        // AMBIL DATABASE SPREADSHEET (MAPPING KOLOM BARU)
        // ====================================================================
        async function fetchDatabase() {
            // URL otomatis dibentuk dari ID Spreadsheet di screenshot.
            // PENTING: File Sheets harus sudah di "Publish to Web" sebagai CSV agar link ini aktif!
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQqFjmQEMLJl-UhiBkV6hDmVePKMGhWgUkwqPWiUOcv6YeBjX9-mw75au_WztJIkcbwr0D2hcDAGZrw/pub?gid=0&single=true&output=csv';
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Gagal mengambil data");
                const csvText = await response.text();
                const rows = csvText.split('\n');
                
                for (let i = 1; i < rows.length; i++) {
                    // Split CSV dengan aman (menghiraukan koma di dalam tanda kutip)
                    const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    // Cek minimal ada 14 kolom agar tidak error baca kolom harga paling kanan
                    if (cols.length >= 14) { 
                        // MAPPING BARU SESUAI GAMBAR
                        let nama = cols[2].replace(/['"]+/g, '').trim(); // Kolom C
                        let kodeJamak = cols[3].replace(/['"]+/g, '').trim(); // Kolom D
                        let kodeTunggal = cols[4].replace(/['"]+/g, '').trim(); // Kolom E
                        
                        // Harga melompat melewati kolom deskripsi satuan
                        let hargaG1 = parseInt(cols[6].replace(/['"\.]+/g, '').trim()) || 0; // Kolom G
                        let hargaG2 = parseInt(cols[9].replace(/['"\.]+/g, '').trim()) || 0; // Kolom J
                        let hargaE1 = parseInt(cols[11].replace(/['"\.]+/g, '').trim()) || 0; // Kolom L
                        let hargaE2 = parseInt(cols[13].replace(/['"\.]+/g, '').trim()) || 0; // Kolom N
                        
                        let baseData = { nama, g1: hargaG1, g2: hargaG2, e1: hargaE1, e2: hargaE2 };
                        
                        if (kodeJamak !== "") database[kodeJamak] = { ...baseData, tipeBarcode: 'jamak' };
                        if (kodeTunggal !== "") database[kodeTunggal] = { ...baseData, tipeBarcode: 'tunggal' };
                        
                        // Hindari masukin baris kosong
                        if (nama !== "" && !listProdukUnik.some(p => p.nama === nama)) {
                            listProdukUnik.push({ ...baseData, tipeBarcode: 'tunggal' });
                        }
                    }
                }
                let inputScanner = document.getElementById('barcodeInput');
                inputScanner.disabled = false; inputScanner.placeholder = "Siap! Ketik / Scan..."; inputScanner.focus();
            } catch (error) {
                document.getElementById('namaBarangPreview').innerText = "Gagal memuat database! Pastikan Sheet sudah Publish to Web (CSV).";
            }
        }
        window.onload = fetchDatabase;

        const inputHibrida = document.getElementById('barcodeInput');
        const dropdownSearch = document.getElementById('searchDropdown');

        inputHibrida.addEventListener('input', function() {
            const keyword = this.value.toLowerCase().trim();
            dropdownSearch.innerHTML = '';
            if (keyword.length < 2) { dropdownSearch.classList.add('hidden'); return; }
            const hasilSearch = listProdukUnik.filter(p => p.nama.toLowerCase().includes(keyword));
            if (hasilSearch.length > 0) {
                dropdownSearch.classList.remove('hidden');
                hasilSearch.forEach(prod => {
                    const li = document.createElement('li');
                    li.className = 'px-4 py-3 hover:bg-gray-100 cursor-pointer border-b border-gray-100 last:border-0 font-medium';
                    li.textContent = prod.nama;
                    li.onclick = () => aktifkanUIBarang(prod);
                    dropdownSearch.appendChild(li);
                });
            } else { dropdownSearch.classList.add('hidden'); }
        });

        document.addEventListener('click', function(e) {
            if (e.target !== inputHibrida && e.target !== dropdownSearch) dropdownSearch.classList.add('hidden');
        });

        inputHibrida.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault(); dropdownSearch.classList.add('hidden');
                let barcode = this.value.trim();
                if (barcode === "") return;
                if (database[barcode]) aktifkanUIBarang(database[barcode]);
                else document.getElementById('namaBarangPreview').innerText = "❌ Barcode tidak ditemukan!";
            }
        });

        function aktifkanUIBarang(dataBarang) {
            currentBarang = dataBarang;
            inputHibrida.value = currentBarang.nama; dropdownSearch.classList.add('hidden');
            document.getElementById('namaBarangPreview').innerText = "Terdeteksi: " + currentBarang.nama;
            document.getElementById('qtyInput').disabled = false; document.getElementById('unitInput').disabled = false;
            let hargaSelect = document.getElementById('hargaSelect'); let customHargaInput = document.getElementById('customHargaInput');
            hargaSelect.disabled = false; hargaSelect.classList.remove('bg-gray-50'); hargaSelect.classList.add('bg-white');
            customHargaInput.disabled = false; document.getElementById('btnTambah').disabled = false;

            let eceranHTML = `<option value="${currentBarang.e2}">Eceran 2 (Rp ${currentBarang.e2.toLocaleString('id-ID')})</option><option value="${currentBarang.e1}">Eceran 1 (Rp ${currentBarang.e1.toLocaleString('id-ID')})</option>`;
            let grosirHTML = `<option value="${currentBarang.g2}">Grosir 2 (Rp ${currentBarang.g2.toLocaleString('id-ID')})</option><option value="${currentBarang.g1}">Grosir 1 (Rp ${currentBarang.g1.toLocaleString('id-ID')})</option>`;

            if (currentBarang.tipeBarcode === 'jamak') hargaSelect.innerHTML = grosirHTML + eceranHTML;
            else hargaSelect.innerHTML = eceranHTML + grosirHTML;
            
            customHargaInput.value = hargaSelect.value;
            hargaSelect.onchange = function() { customHargaInput.value = this.value; };
            document.getElementById('qtyInput').focus(); document.getElementById('qtyInput').select();
        }

        ['qtyInput', 'unitInput', 'hargaSelect', 'customHargaInput'].forEach(id => {
            document.getElementById(id).addEventListener('keypress', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); prosesTambahKeList(); }
            });
        });
        document.getElementById('btnTambah').addEventListener('click', prosesTambahKeList);

        function prosesTambahKeList() {
            if (!currentBarang) return;
            let qty = parseInt(document.getElementById('qtyInput').value) || 1;
            let unit = document.getElementById('unitInput').value;
            let hargaSatuan = parseInt(document.getElementById('customHargaInput').value) || 0;
            let tbody = document.getElementById('listBarang');
            let tr = document.createElement('tr');
            
            tr.className = "border-b border-gray-300 baris-barang hover:bg-[#dbe4c6]/40 transition-colors";
            tr.innerHTML = `
                <td class="py-3 text-center font-bold text-gray-700 align-middle"><span class="nomor-urut"></span></td>
                <td class="py-3 px-2 align-middle">
                    <div class="flex gap-2">
                        <input type="number" class="w-16 bg-white border border-gray-300 rounded-md p-2 text-sm row-qty focus:outline-none focus:border-[#647a46] shadow-sm text-center font-medium" value="${qty}" min="1">
                        <select class="bg-white border border-gray-300 rounded-md p-2 pr-6 text-sm row-unit focus:outline-none focus:border-[#647a46] shadow-sm">
                            <option value="pcs" ${unit==='pcs'?'selected':''}>Pcs</option>
                            <option value="lusin" ${unit==='lusin'?'selected':''}>Lsn</option>
                            <option value="pak" ${unit==='pak'?'selected':''}>Pak</option>
                            <option value="dus" ${unit==='dus'?'selected':''}>Dus</option>
                            <option value="slop/roll" ${unit==='slop/roll'?'selected':''}>Slop/roll</option>
                            <option value="rim" ${unit==='rim'?'selected':''}>Rim</option>
                            <option value="ball" ${unit==='ball'?'selected':''}>Ball</option>
                            <option value="kodi" ${unit==='kodi'?'selected':''}>Kodi</option>
                            <option value="gross" ${unit==='gross'?'selected':''}>Gross</option>
                            <option value="papan" ${unit==='papan'?'selected':''}>Papan</option>
                        </select>
                    </div>
                </td>
                <td class="py-3 px-2 align-middle">
                    <textarea class="w-full bg-white border border-gray-300 rounded-md p-2 text-sm focus:outline-none focus:border-[#647a46] shadow-sm row-nama resize-none h-11 font-medium leading-tight">${currentBarang.nama}</textarea>
                </td>
                <td class="py-3 px-2 align-middle">
                    <input type="number" class="w-full bg-white border border-gray-300 rounded-md p-2 text-sm font-semibold row-harga focus:outline-none focus:border-[#647a46] shadow-sm text-right" value="${hargaSatuan}">
                </td>
                <td class="py-3 px-2 text-right align-middle">
                    <span class="subtotal-teks font-bold text-gray-800 bg-white border border-gray-300 rounded-md py-2 px-3 shadow-sm block whitespace-nowrap">Rp 0</span>
                </td>
                <td class="py-3 text-center align-middle">
                    <button class="text-gray-400 hover:text-red-600 font-extrabold text-xl btn-hapus transition-colors" title="Hapus Baris">✕</button>
                </td>
            `;
            
            let inputs = tr.querySelectorAll('.row-qty, .row-unit, .row-harga, .row-nama');
            inputs.forEach(input => {
                input.addEventListener('input', updateBaris); input.addEventListener('change', updateBaris);
            });
            tr.querySelector('.btn-hapus').addEventListener('click', function() {
                tr.remove(); hitungTotalSemua(); updateNomorUrut(); cekSemuaRedundansi(); 
            });
            function updateBaris() {
                let rQty = parseInt(tr.querySelector('.row-qty').value) || 0;
                let rHarga = parseInt(tr.querySelector('.row-harga').value) || 0;
                let rSubtotal = rHarga * rQty;
                tr.querySelector('.subtotal-teks').innerText = 'Rp ' + rSubtotal.toLocaleString('id-ID');
                hitungTotalSemua(); cekSemuaRedundansi();
            }
            tbody.appendChild(tr); updateBaris(); updateNomorUrut(); cekSemuaRedundansi(); resetAreaInput();
        }

        function cekSemuaRedundansi() {
            let listNama = Array.from(document.querySelectorAll('.row-nama')).map(ta => ta.value.trim());
            let counts = {};
            listNama.forEach(nama => { counts[nama] = (counts[nama] || 0) + 1; });
            let redundanItems = [];
            for (let nama in counts) { if (counts[nama] > 1 && nama !== "") redundanItems.push(`${nama} (${counts[nama]} baris)`); }
            let infoBar = document.getElementById('infoRedundansi');
            if (redundanItems.length > 0) { document.getElementById('teksRedundansi').innerText = redundanItems.join(', '); infoBar.classList.remove('hidden'); } 
            else { infoBar.classList.add('hidden'); }
        }

        function resetAreaInput() {
            currentBarang = null;
            let inp = document.getElementById('barcodeInput');
            inp.value = ''; inp.placeholder = "Siap! Ketik / Scan..."; document.getElementById('searchDropdown').classList.add('hidden');
            document.getElementById('namaBarangPreview').innerText = ''; document.getElementById('qtyInput').value = '1'; document.getElementById('qtyInput').disabled = true;
            document.getElementById('unitInput').value = 'pcs'; document.getElementById('unitInput').disabled = true;
            let hargaSelect = document.getElementById('hargaSelect');
            hargaSelect.innerHTML = '<option value="">Pilih harga otomatis...</option>'; hargaSelect.disabled = true; hargaSelect.classList.remove('bg-white'); hargaSelect.classList.add('bg-gray-50');
            let customHargaInput = document.getElementById('customHargaInput');
            customHargaInput.value = ''; customHargaInput.disabled = true; document.getElementById('btnTambah').disabled = true;
            inp.focus();
        }

        function updateNomorUrut() {
            document.querySelectorAll('.baris-barang').forEach((tr, index) => { tr.querySelector('.nomor-urut').innerText = index + 1; });
        }

        function hitungTotalSemua() {
            let grandTotal = 0;
            document.querySelectorAll('.baris-barang').forEach(tr => {
                let rQty = parseInt(tr.querySelector('.row-qty').value) || 0;
                let rHarga = parseInt(tr.querySelector('.row-harga').value) || 0;
                grandTotal += (rQty * rHarga);
            });
            document.getElementById('totalAkhir').innerText = grandTotal.toLocaleString('id-ID');
            broadcastKeTablet();
        }

        function cetakStruk() {
            let printData = [];
            document.querySelectorAll('.baris-barang').forEach((tr, index) => {
                let qty = parseInt(tr.querySelector('.row-qty').value) || 0; let unit = tr.querySelector('.row-unit').value; let nama = tr.querySelector('.row-nama').value;
                let harga = parseInt(tr.querySelector('.row-harga').value) || 0; let subtotal = harga * qty;
                printData.push({ no: index + 1, qty, unit, nama, harga, subtotal });
            });

            let tanggal = document.getElementById('displayTanggal').innerText; let tuanToko = document.getElementById('inputTuanToko').value || '-';
            let catatan = document.getElementById('inputCatatan').value || '-'; let grandTotal = document.getElementById('totalAkhir').innerText;

            let html = ''; let totalItems = printData.length; let maxPerColumn = 25; 
            if (totalItems === 0) html = '<p style="text-align:center; padding-top:40px; font-size: 20px;">Struk kosong.</p>';
            let capStempelHTML = `<img src="${URL_STEMPEL}" class="cap-stempel" alt="Cap Resmi">`;
            let headerHTML = `<div class="mb-3"><h2 class="font-bold italic">${NAMA_TOKO}</h2><p class="address-text">${ALAMAT_TOKO}</p><table style="width: auto !important; font-size: 11px; border: none !important;"><tr style="border: none !important;"><td style="border: none !important;" class="font-bold !pr-2 !pb-0 !pl-0 !pt-0">Tanggal</td><td style="border: none !important;" class="!p-0">: ${tanggal}</td></tr><tr style="border: none !important;"><td style="border: none !important;" class="font-bold !pr-2 !pb-0 !pl-0 !pt-0">Tuan Toko</td><td style="border: none !important;" class="!p-0">: ${tuanToko}</td></tr><tr style="border: none !important;"><td style="border: none !important;" class="font-bold !pr-2 !pb-0 !pl-0 !pt-0">Catatan</td><td style="border: none !important;" class="!p-0">: ${catatan}</td></tr></table></div>`;
            let totalHTML = `<div style="display: flex; justify-content: flex-end; margin-top: 10px;"><div style="text-align: right; width: 200px;"><h3 style="font-size: 14px; font-weight: bold; margin:0; border-top: 2px solid black; padding-top: 4px;">Total: Rp ${grandTotal}</h3><div class="area-tanda-tangan">${capStempelHTML}<div class="teks-tanda-tangan"><p>Hormat Kami,</p><br><br><p>( ............................ )</p></div></div></div></div>`;

            if (totalItems <= maxPerColumn && totalItems > 0) {
                let tableHTML = renderPrintTable(printData); let fullReceipt = `<div style="display:flex; flex-direction:column; height:100%;">${headerHTML}<div style="flex-grow:1;">${tableHTML}</div>${totalHTML}</div>`;
                html = `<div class="print-page"><div style="width: 48%;">${fullReceipt}</div><div class="col-kanan" style="width: 48%;">${fullReceipt}</div></div>`;
            } else if (totalItems > maxPerColumn) {
                for (let i = 0; i < totalItems; i += 50) { 
                    let chunk = printData.slice(i, i + 50); let col1 = chunk.slice(0, 25); let col2 = chunk.slice(25, 50);
                    let isFirstPage = (i === 0); let isLastPage = (i + 50 >= totalItems);
                    html += `<div class="print-page"><div style="width: 48%; display:flex; flex-direction:column;">`;
                    if (isFirstPage) html += headerHTML; 
                    html += `<div style="flex-grow:1;">${renderPrintTable(col1)}</div>`;
                    if (isLastPage && col2.length === 0) html += totalHTML; 
                    html += `</div><div class="col-kanan" style="width: 48%; display:flex; flex-direction:column;">`;
                    if (col2.length > 0) { html += `<div style="flex-grow:1;">${renderPrintTable(col2)}</div>`; if (isLastPage) html += totalHTML; }
                    html += `</div></div>`; 
                }
            }
            
            const targetContainer = document.getElementById('printLayout'); targetContainer.innerHTML = html;
            const imagesInPrint = targetContainer.querySelectorAll('img');
            const imagePromises = Array.from(imagesInPrint).map(img => {
                if (img.complete) return Promise.resolve(); 
                return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
            });
            Promise.all(imagePromises).then(() => { setTimeout(() => { window.print(); }, 100); });
        }

        function renderPrintTable(items) {
            if(items.length === 0) return '';
            let t = `<table><thead><tr><th style="width: 10%;">No</th><th style="width: 15%;">Qty</th><th style="width: 40%;">Nama Barang</th><th style="width: 15%;">Harga</th><th style="width: 20%;">Jumlah</th></tr></thead><tbody>`;
            items.forEach(item => { t += `<tr><td style="text-align: center;">${item.no}</td><td style="text-align: center;">${item.qty} ${item.unit}</td><td>${item.nama}</td><td style="text-align: right;">${item.harga.toLocaleString('id-ID')}</td><td style="text-align: right;">${item.subtotal.toLocaleString('id-ID')}</td></tr>`; });
            t += `</tbody></table>`; return t;
        }
    </script>
</body>
</html>
